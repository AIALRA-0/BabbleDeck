name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: babbledeck
          POSTGRES_PASSWORD: pg-${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: babbledeck_dev
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U babbledeck -d babbledeck_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://babbledeck:pg-${{ github.run_id }}-${{ github.run_attempt }}@localhost:55432/babbledeck_dev
      E2E_ADMIN_EMAIL: admin@example.invalid
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Generate masked CI credentials
        run: |
          seed="$(node -e 'process.stdout.write(`ci_${require("node:crypto").randomBytes(24).toString("base64url")}`)')"
          rotated="$(node -e 'process.stdout.write(`ci_rotated_${require("node:crypto").randomBytes(24).toString("base64url")}`)')"
          echo "::add-mask::$seed"
          echo "::add-mask::$rotated"
          echo "SEED_ADMIN_PASSWORD=$seed" >> "$GITHUB_ENV"
          echo "E2E_ADMIN_PASSWORD=$seed" >> "$GITHUB_ENV"
          echo "E2E_NEW_ADMIN_PASSWORD=$rotated" >> "$GITHUB_ENV"
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm db:validate
      - run: pnpm db:generate
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm exec tsc --noEmit --module NodeNext --moduleResolution NodeNext --target ES2022 --types node --skipLibCheck scripts/recorder-ws-server.ts scripts/prune-audio-retention.ts scripts/migrate-audio-storage.ts scripts/audit-audio-storage.ts scripts/preflight-audio-storage.ts scripts/check-audio-cutover-readiness.ts scripts/check-device-runtime-readiness.ts scripts/record-device-runtime-evidence.ts scripts/preflight-livekit.ts scripts/collect-production-metrics.ts scripts/load-smoke-production.ts scripts/soniox-smoke-production.ts scripts/security-baseline-audit.ts scripts/verify-wrapper-configs.ts scripts/check-production-readiness.ts scripts/sync-seed-admin.ts scripts/secret-scan.ts playwright.config.ts
      - run: pnpm build
      - name: Secret scan
        run: pnpm secret:scan
